services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - .env

  wakeword:
    build:
      context: ./server/wakeword
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - WAKEWORD_PORT=9000
      - WAKEWORD_MODEL=${WAKEWORD_MODEL:-hey_jarvis}
      - WAKEWORD_THRESHOLD=${WAKEWORD_THRESHOLD:-0.5}
    profiles:
      - wakeword
