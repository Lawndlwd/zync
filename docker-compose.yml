services:
  frontend:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      args:
        MODE: development
    ports:
      - "${ZYNC_PORT:-8080}:5173"
    volumes:
      - ./packages/app/src:/app/packages/app/src
      - ./packages/app/public:/app/packages/app/public
      - ./packages/app/index.html:/app/packages/app/index.html
      - ./packages/app/vite.config.ts:/app/packages/app/vite.config.ts
      - ./packages/shared/src:/app/packages/shared/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VITE_BACKEND_URL=http://backend:3001
      - VITE_WAKEWORD_URL=ws://wakeword:9000
      - VITE_OPENCODE_URL=http://opencode:4096
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      args:
        MODE: development
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
      - OPENCODE_URL=http://opencode:4096
      - WHISPER_SERVICE_URL=http://whisper:9100
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/server/data:/app/packages/server/data
      - ./data/documents:/app/documents
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      whisper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  whisper:
    build:
      context: ./packages/whisper
      dockerfile: Dockerfile
    expose:
      - "9100"
    environment:
      - WHISPER_PORT=9100
      - WHISPER_MODEL=${WHISPER_MODEL:-base.en}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  wakeword:
    build:
      context: ./packages/wakeword
      dockerfile: Dockerfile
    environment:
      - WAKEWORD_PORT=9000
      - WAKEWORD_MODEL=${WAKEWORD_MODEL:-hey_jarvis}
      - WAKEWORD_THRESHOLD=${WAKEWORD_THRESHOLD:-0.5}
    restart: unless-stopped

  opencode:
    build:
      context: .
      dockerfile: packages/opencode/Dockerfile
    ports:
      - "4096:4096"
    env_file:
      - path: .env
        required: false
    environment:
      - CORS_ORIGINS=http://frontend:5173,http://localhost:5173,http://backend:3001
      - OPENCODE_LOG_LEVEL=${OPENCODE_LOG_LEVEL:-INFO}
    volumes:
      - ./packages/server/data:/app/packages/server/data
      - opencode-data:/home/node/.local/share/opencode
      # Mount your opencode config with provider keys (optional)
      # - ~/.config/opencode/opencode.json:/config/opencode.json:ro
    restart: unless-stopped

volumes:
  opencode-data:
