name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-app:
    strategy:
      matrix:
        runner:
          - os: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.runner.platform }}
          push: true
          tags: ghcr.io/lawndlwd/zync:${{ github.sha }}-${{ matrix.runner.suffix }}
          cache-from: type=gha,scope=app-${{ matrix.runner.suffix }}
          cache-to: type=gha,mode=max,scope=app-${{ matrix.runner.suffix }}

  build-opencode:
    strategy:
      matrix:
        runner:
          - os: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/opencode/Dockerfile
          platforms: ${{ matrix.runner.platform }}
          push: true
          tags: ghcr.io/lawndlwd/zync-opencode:${{ github.sha }}-${{ matrix.runner.suffix }}
          cache-from: type=gha,scope=opencode-${{ matrix.runner.suffix }}
          cache-to: type=gha,mode=max,scope=opencode-${{ matrix.runner.suffix }}

  build-voice:
    strategy:
      matrix:
        image:
          - name: whisper
            context: ./packages/whisper
          - name: wakeword
            context: ./packages/wakeword
        runner:
          - os: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          platforms: ${{ matrix.runner.platform }}
          push: true
          tags: ghcr.io/lawndlwd/zync-${{ matrix.image.name }}:${{ github.sha }}-${{ matrix.runner.suffix }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.runner.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.runner.suffix }}

  merge:
    needs: [build-app, build-opencode, build-voice]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: zync
            prefix: ghcr.io/lawndlwd/zync
          - name: zync-opencode
            prefix: ghcr.io/lawndlwd/zync-opencode
          - name: zync-whisper
            prefix: ghcr.io/lawndlwd/zync-whisper
          - name: zync-wakeword
            prefix: ghcr.io/lawndlwd/zync-wakeword
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.prefix }}:latest \
            -t ${{ matrix.prefix }}:${{ github.sha }} \
            ${{ matrix.prefix }}:${{ github.sha }}-amd64 \
            ${{ matrix.prefix }}:${{ github.sha }}-arm64
