name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/lawndlwd/zync

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        image:
          - name: frontend
            context: .
            file: Dockerfile.frontend
          - name: backend
            context: .
            file: Dockerfile.backend
          - name: whisper
            context: ./server/whisper
            file: ./server/whisper/Dockerfile
          - name: wakeword
            context: ./server/wakeword
            file: ./server/wakeword/Dockerfile
        runner:
          - os: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.runner.platform }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}:${{ github.sha }}-${{ matrix.runner.suffix }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.runner.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.runner.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [frontend, backend, whisper, wakeword]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest \
            -t ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ github.sha }}-arm64
